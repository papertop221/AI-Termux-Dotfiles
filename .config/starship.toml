# Starship Tokyo Night Minimalist
format = """$directory$git_branch$git_status$python$character"""

[directory]
style = "bold blue"
truncation_length = 3
truncation_symbol = "…/"

[git_branch]
symbol = "󰊢 "
style = "bold purple"

[git_status]
style = "bold red"

[python]
symbol = " "
style = "bold yellow"

[character]
success_symbol = "[󰄾](bold green) "
error_symbol = "[󰄾](bold red) "
